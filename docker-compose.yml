version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: edatia-db
    restart: always
    environment:
      POSTGRES_DB: edatia_erp
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edatia_secret_2026}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - default

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edatia-backend
    restart: always
    depends_on:
      - db
    env_file:
      - ./backend/.env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api.rule=Host(`api.edatia.com`)"
      - "traefik.http.routers.api.entrypoints=websecure"
      - "traefik.http.routers.api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.api.loadbalancer.server.port=4000"
    networks:
      - default

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edatia-frontend
    restart: always
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.web.rule=Host(`erp.edatia.com`)"
      - "traefik.http.routers.web.entrypoints=websecure"
      - "traefik.http.routers.web.tls.certresolver=mytlschallenge"
      - "traefik.http.services.web.loadbalancer.server.port=80"
    networks:
      - default

networks:
  default:
    external: true
    name: n8n_default

volumes:
  db-data:
