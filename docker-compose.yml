services:
  db:
    image: postgres:15-alpine
    container_name: edatia-db
    restart: always
    environment:
      POSTGRES_DB: edatia_erp
      POSTGRES_USER: ${DB_USER:-admin}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-edatia_secret_2026}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - default

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: edatia-backend
    restart: always
    depends_on:
      - db
    env_file:
      - ./backend/.env
    labels:
      - "traefik.enable=true"
      # Router HTTPS (tráfico principal)
      - "traefik.http.routers.edatia-api.rule=Host(`api.edatia.com`)"
      - "traefik.http.routers.edatia-api.entrypoints=websecure"
      - "traefik.http.routers.edatia-api.tls=true"
      - "traefik.http.routers.edatia-api.tls.certresolver=mytlschallenge"
      - "traefik.http.services.edatia-api.loadbalancer.server.port=4000"
      # Router HTTP (permite challenge y redirige a HTTPS)
      - "traefik.http.routers.edatia-api-http.rule=Host(`api.edatia.com`)"
      - "traefik.http.routers.edatia-api-http.entrypoints=web"
    networks:
      - default

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: edatia-frontend
    restart: always
    labels:
      - "traefik.enable=true"
      # Router HTTPS (tráfico principal)
      - "traefik.http.routers.edatia-web.rule=Host(`erp.edatia.com`)"
      - "traefik.http.routers.edatia-web.entrypoints=websecure"
      - "traefik.http.routers.edatia-web.tls=true"
      - "traefik.http.routers.edatia-web.tls.certresolver=mytlschallenge"
      - "traefik.http.services.edatia-web.loadbalancer.server.port=80"
      # Router HTTP (permite challenge y redirige a HTTPS)
      - "traefik.http.routers.edatia-web-http.rule=Host(`erp.edatia.com`)"
      - "traefik.http.routers.edatia-web-http.entrypoints=web"
    networks:
      - default

networks:
  default:
    external: true
    name: n8n_default

volumes:
  db-data:
