<link rel="stylesheet" href="/frontend/assets/css/header.css">
<header class="main-header">
    <div id="camia-dashboard-widget" class="camia-header-widget">
        <div class="camia-avatar">
            <span class="ca-icon">CA</span>
        </div>
        <div class="camia-bubble">
            <p id="camia-greeting">Bienvenido a ERPod Empresas.</p>
        </div>
    </div>

    <div class="search-bar">
        <input type="text" placeholder="Buscar...">
    </div>

    <div class="header-actions">
        <div class="notifications">
            <i class="fas fa-bell"></i>
            <span class="badge">3</span>
        </div>

        <div class="user-profile">
            <div class="avatar">
                <span id="user-initials">AD</span>
            </div>
            <div class="user-info">
                <span class="name" id="user-name">Admin</span>
            </div>
        </div>
    </div>
</header>
