<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPod SOFTWARE | Libro Diario</title>
    <link rel="stylesheet" href="/frontend/assets/css/dashboard.css?v=1.2">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <!-- ACTION BAR -->
        <div class="action-bar" style="margin-top: 0; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="font-size: 1.3rem; font-weight: 700; color: var(--text-dark); margin: 0;">Libro Diario</h1>
                <p style="color: var(--text-gray); margin: 2px 0 0 0; font-size: 0.85rem;">Registro cronológico de todos
                    los movimientos contables</p>
            </div>
            <button class="btn-secondary" id="btn-exportar" style="padding: 8px 14px; font-size: 0.85rem;">
                <i class="fas fa-file-excel"></i> Exportar a Excel
            </button>
        </div>

        <!-- FILTERS -->
        <div class="card" style="margin-top: 15px; padding: 12px 15px;">
            <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;">
                <div>
                    <label
                        style="font-size: 0.8rem; color: var(--text-gray); display: block; margin-bottom: 4px;">Desde</label>
                    <input type="date" id="filter-fecha-inicio" class="form-control"
                        style="padding: 8px; font-size: 0.85rem;">
                </div>
                <div>
                    <label
                        style="font-size: 0.8rem; color: var(--text-gray); display: block; margin-bottom: 4px;">Hasta</label>
                    <input type="date" id="filter-fecha-fin" class="form-control"
                        style="padding: 8px; font-size: 0.85rem;">
                </div>
                <div>
                    <label
                        style="font-size: 0.8rem; color: var(--text-gray); display: block; margin-bottom: 4px;">Cuenta
                        (opcional)</label>
                    <select id="filter-cuenta" class="form-control" style="padding: 8px; font-size: 0.85rem;">
                        <option value="">Todas las cuentas</option>
                    </select>
                </div>
                <div style="display: flex; align-items: flex-end;">
                    <button class="btn-premium" id="btn-filtrar"
                        style="padding: 8px 14px; font-size: 0.85rem; width: 100%;">
                        <i class="fas fa-search"></i> Buscar
                    </button>
                </div>
            </div>
        </div>

        <!-- TOTALS -->
        <div style="display: flex; gap: 15px; margin-top: 15px;">
            <div class="card" style="padding: 12px 18px; display: flex; align-items: center; gap: 12px; flex: 1;">
                <div class="card-icon-box"
                    style="background: rgba(16, 185, 129, 0.1); color: #10B981; width: 40px; height: 40px; font-size: 1rem; flex-shrink: 0;">
                    <i class="fas fa-plus-circle"></i>
                </div>
                <div style="flex: 1;">
                    <h3 style="font-size: 0.75rem; margin: 0; color: var(--text-gray); font-weight: 500;">Total Débitos
                    </h3>
                    <p id="total-debitos"
                        style="font-size: 1.2rem; font-weight: 700; margin: 2px 0 0 0; color: var(--text-dark);">$0.00
                    </p>
                </div>
            </div>
            <div class="card" style="padding: 12px 18px; display: flex; align-items: center; gap: 12px; flex: 1;">
                <div class="card-icon-box"
                    style="background: rgba(239, 68, 68, 0.1); color: #EF4444; width: 40px; height: 40px; font-size: 1rem; flex-shrink: 0;">
                    <i class="fas fa-minus-circle"></i>
                </div>
                <div style="flex: 1;">
                    <h3 style="font-size: 0.75rem; margin: 0; color: var(--text-gray); font-weight: 500;">Total Créditos
                    </h3>
                    <p id="total-creditos"
                        style="font-size: 1.2rem; font-weight: 700; margin: 2px 0 0 0; color: var(--text-dark);">$0.00
                    </p>
                </div>
            </div>
        </div>

        <!-- TABLE -->
        <div class="table-container card" style="margin-top: 12px; padding: 0;">
            <table class="glass-table">
                <thead>
                    <tr>
                        <th style="width: 10%;">Fecha</th>
                        <th style="width: 10%;">Comprobante</th>
                        <th style="width: 8%;">Tipo</th>
                        <th style="width: 12%;">Cuenta</th>
                        <th style="width: 30%;">Descripción</th>
                        <th style="width: 15%;">Débito</th>
                        <th style="width: 15%;">Crédito</th>
                    </tr>
                </thead>
                <tbody id="libro-diario-tbody">
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 50px; color: var(--text-gray);">
                            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
                            <p>Cargando libro diario...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <!-- JS LOADERS -->
    <script src="/frontend/assets/js/layout-loader.js"></script>
    <script src="/frontend/assets/js/auth_guard.js"></script>
    <script src="/frontend/assets/js/notifications.js"></script>

    <script>
        const BACKEND_URL = 'https://erpod.onrender.com';

        document.addEventListener('DOMContentLoaded', async () => {
            await loadCuentas();
            await loadLibroDiario();

            document.getElementById('btn-filtrar').addEventListener('click', loadLibroDiario);
            document.getElementById('btn-exportar').addEventListener('click', exportarExcel);
        });

        async function loadCuentas() {
            try {
                const token = localStorage.getItem('token');
                const res = await fetch(BACKEND_URL + '/api/contabilidad/puc', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const json = await res.json();
                if (json.success) {
                    const select = document.getElementById('filter-cuenta');
                    json.data.forEach(c => {
                        const opt = document.createElement('option');
                        opt.value = c.codigo;
                        opt.textContent = `${c.codigo} - ${c.nombre}`;
                        select.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error('Error loading cuentas:', e);
            }
        }

        async function loadLibroDiario() {
            const tbody = document.getElementById('libro-diario-tbody');
            tbody.innerHTML = '<tr><td colspan="7" class="text-center"><i class="fas fa-spinner fa-spin"></i> Cargando...</td></tr>';

            try {
                const token = localStorage.getItem('token');
                const params = new URLSearchParams();

                const fechaInicio = document.getElementById('filter-fecha-inicio').value;
                const fechaFin = document.getElementById('filter-fecha-fin').value;
                const cuenta = document.getElementById('filter-cuenta').value;

                if (fechaInicio) params.append('fecha_inicio', fechaInicio);
                if (fechaFin) params.append('fecha_fin', fechaFin);
                if (cuenta) params.append('cuenta_codigo', cuenta);

                const res = await fetch(BACKEND_URL + '/api/contabilidad/libro-diario?' + params.toString(), {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const json = await res.json();

                if (json.success) {
                    renderLibroDiario(json.data, json.totales);
                } else {
                    tbody.innerHTML = '<tr><td colspan="7" style="color:red; text-align:center">Error cargando datos.</td></tr>';
                }

            } catch (e) {
                console.error('Error loading libro diario:', e);
                tbody.innerHTML = '<tr><td colspan="7" style="color:red; text-align:center">Error de conexión.</td></tr>';
            }
        }

        function renderLibroDiario(data, totales) {
            const tbody = document.getElementById('libro-diario-tbody');
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" style="text-align: center; padding: 40px;">
                            <div style="background: #eff6ff; display: inline-block; padding: 20px; border-radius: 50%; margin-bottom: 15px;">
                                <i class="fas fa-book" style="color: #3b82f6; font-size: 2rem;"></i>
                            </div>
                            <h3 style="color: #1e293b; margin-bottom: 5px;">No hay movimientos</h3>
                            <p style="color: #64748b;">No se encontraron movimientos contables en el rango seleccionado.</p>
                        </td>
                    </tr>
                `;
                document.getElementById('total-debitos').textContent = '$0.00';
                document.getElementById('total-creditos').textContent = '$0.00';
                return;
            }

            data.forEach(mov => {
                const row = document.createElement('tr');

                const debito = parseFloat(mov.debito || 0);
                const credito = parseFloat(mov.credito || 0);

                row.innerHTML = `
                    <td>${new Date(mov.fecha).toLocaleDateString('es-CO')}</td>
                    <td style="font-family: monospace;">${mov.numero}</td>
                    <td><span class="badge info" style="font-size: 0.75rem;">${mov.tipo}</span></td>
                    <td style="font-family: monospace; font-size: 0.85rem;">${mov.cuenta_codigo}<br><small style="color: var(--text-gray);">${mov.cuenta_nombre || ''}</small></td>
                    <td style="font-size: 0.85rem;">${mov.movimiento_desc || mov.comprobante_desc || '-'}</td>
                    <td style="font-weight: 600; color: #10b981;">${debito > 0 ? '$' + debito.toLocaleString('es-CO', { minimumFractionDigits: 2 }) : '-'}</td>
                    <td style="font-weight: 600; color: #ef4444;">${credito > 0 ? '$' + credito.toLocaleString('es-CO', { minimumFractionDigits: 2 }) : '-'}</td>
                `;
                tbody.appendChild(row);
            });

            // Update totals
            document.getElementById('total-debitos').textContent = '$' + totales.debito.toLocaleString('es-CO', { minimumFractionDigits: 2 });
            document.getElementById('total-creditos').textContent = '$' + totales.credito.toLocaleString('es-CO', { minimumFractionDigits: 2 });
        }

        function exportarExcel() {
            alert('Funcionalidad de exportación en desarrollo');
            // TODO: Implement Excel export
        }
    </script>
</body>

</html>
