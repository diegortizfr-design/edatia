<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPod SOFTWARE | Plan Único de Cuentas</title>
    <link rel="stylesheet" href="/frontend/assets/css/dashboard.css?v=1.2">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <!-- HERO KPI SECTION -->
        <section style="display: flex; gap: 15px; flex-wrap: wrap;">
            <div class="card"
                style="padding: 12px 18px; display: flex; align-items: center; gap: 12px; flex: 1; min-width: 200px;">
                <div class="card-icon-box"
                    style="background: rgba(16, 185, 129, 0.1); color: #10B981; width: 40px; height: 40px; font-size: 1rem; flex-shrink: 0;">
                    <i class="fas fa-coins"></i>
                </div>
                <div style="flex: 1;">
                    <h3 style="font-size: 0.75rem; margin: 0; color: var(--text-gray); font-weight: 500;">Activos</h3>
                    <p id="kpi-total-activos"
                        style="font-size: 1.2rem; font-weight: 700; margin: 2px 0 0 0; color: var(--text-dark);">$0.00
                    </p>
                </div>
            </div>
            <div class="card"
                style="padding: 12px 18px; display: flex; align-items: center; gap: 12px; flex: 1; min-width: 200px;">
                <div class="card-icon-box"
                    style="background: rgba(239, 68, 68, 0.1); color: #EF4444; width: 40px; height: 40px; font-size: 1rem; flex-shrink: 0;">
                    <i class="fas fa-hand-holding-usd"></i>
                </div>
                <div style="flex: 1;">
                    <h3 style="font-size: 0.75rem; margin: 0; color: var(--text-gray); font-weight: 500;">Pasivos</h3>
                    <p id="kpi-total-pasivos"
                        style="font-size: 1.2rem; font-weight: 700; margin: 2px 0 0 0; color: var(--text-dark);">$0.00
                    </p>
                </div>
            </div>
            <div class="card"
                style="padding: 12px 18px; display: flex; align-items: center; gap: 12px; flex: 1; min-width: 200px;">
                <div class="card-icon-box"
                    style="background: rgba(59, 130, 246, 0.1); color: #3B82F6; width: 40px; height: 40px; font-size: 1rem; flex-shrink: 0;">
                    <i class="fas fa-balance-scale"></i>
                </div>
                <div style="flex: 1;">
                    <h3 style="font-size: 0.75rem; margin: 0; color: var(--text-gray); font-weight: 500;">Patrimonio
                    </h3>
                    <p id="kpi-total-patrimonio"
                        style="font-size: 1.2rem; font-weight: 700; margin: 2px 0 0 0; color: var(--text-dark);">$0.00
                    </p>
                </div>
            </div>
        </section>

        <!-- ACTION BAR -->
        <div class="action-bar" style="margin-top: 15px; justify-content: space-between; align-items: center;">
            <div>
                <h1 style="font-size: 1.3rem; font-weight: 700; color: var(--text-dark); margin: 0;">Plan Único de
                    Cuentas</h1>
                <p style="color: var(--text-gray); margin: 2px 0 0 0; font-size: 0.85rem;">Gestiona la estructura
                    contable de tu empresa</p>
            </div>
            <div style="display: flex; gap: 8px;">
                <button class="btn-secondary" id="btn-import-puc" style="padding: 8px 14px; font-size: 0.85rem;">
                    <i class="fas fa-file-import"></i> Importar Plantilla
                </button>
                <button class="btn-premium" id="btn-nueva-cuenta" style="padding: 8px 14px; font-size: 0.85rem;">
                    <i class="fas fa-plus"></i> Nueva Cuenta
                </button>
            </div>
        </div>

        <!-- SEARCH -->
        <div class="card" style="margin-top: 12px; padding: 10px 15px;">
            <div style="display: flex; gap: 15px;">
                <div class="search-bar" style="width: 100%; max-width: 600px;">
                    <i class="fas fa-search" style="color: var(--text-gray);"></i>
                    <input type="text" id="search-puc" placeholder="Buscar por código o nombre de cuenta...">
                </div>
            </div>
        </div>

        <!-- PUC TREE VIEW TABLE -->
        <div class="table-container card" style="margin-top: 12px; padding: 0;">
            <table class="glass-table">
                <thead>
                    <tr>
                        <th style="width: 20%;">Código</th>
                        <th style="width: 40%;">Nombre de la Cuenta</th>
                        <th style="width: 15%;">Naturaleza</th>
                        <th style="width: 15%;">Nivel</th>
                        <th style="width: 10%;">Estado</th>
                        <th style="width: 5%;"></th>
                    </tr>
                </thead>
                <tbody id="puc-table-body">
                    <tr>
                        <td colspan="6" style="text-align: center; padding: 50px; color: var(--text-gray);">
                            <i class="fas fa-spinner fa-spin" style="font-size: 2rem; margin-bottom: 10px;"></i>
                            <p>Cargando Plan de Cuentas...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <!-- MODAL: NUEVA CUENTA / AUXILIAR -->
    <div id="modal-nueva-cuenta" class="modal" style="display: none;">
        <div class="modal-content" style="max-width: 700px;">
            <div class="modal-header">
                <h2>Gestión de Cuentas / Auxiliares</h2>
                <span class="close-modal-btn" data-target="modal-nueva-cuenta">&times;</span>
            </div>
            <form id="form-nueva-cuenta">

                <!-- ROW 1: PARENT SELECTOR -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px;">
                    <div class="form-group">
                        <label style="display:block; margin-bottom:5px; font-weight:600;">Cuenta Padre <small
                                style="color:var(--text-gray)">(Seleccione para crear subcuenta)</small></label>
                        <select id="new-padre" class="form-control"
                            style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                            <option value="">-- Es una cuenta principal --</option>
                            <!-- Populated by JS -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label style="display:block; margin-bottom:5px; font-weight:600;">Nivel Resultante</label>
                        <input type="text" id="new-nivel-label" value="Clase" readonly
                            style="width:100%; padding:10px; border-radius:8px; border:1px solid #eee; background: #f9fafb; color: #666;">
                        <input type="hidden" id="new-tipo">
                        <input type="hidden" id="new-nivel">
                    </div>
                </div>

                <!-- ROW 2: CODE & NAME -->
                <div style="display: grid; grid-template-columns: 150px 1fr; gap: 20px; margin-bottom: 20px;">
                    <div class="form-group">
                        <label style="display:block; margin-bottom:5px; font-weight:600;">Código</label>
                        <div style="display: flex; align-items: center;">
                            <span id="prefix-code"
                                style="background:#eee; padding:10px; border:1px solid #ddd; border-right:none; border-radius:8px 0 0 8px; color:#666;"></span>
                            <input type="text" id="new-codigo-suffix" placeholder="Código" class="form-control"
                                style="width:100%; padding:10px; border-radius:0 8px 8px 0; border:1px solid #ddd;"
                                required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label style="display:block; margin-bottom:5px; font-weight:600;">Nombre / Descripción</label>
                        <input type="text" id="new-nombre" placeholder="Nombre de la cuenta" class="form-control"
                            style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;" required>
                    </div>
                </div>

                <!-- ROW 3: NATURE & CONFIG -->
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
                    <div class="form-group">
                        <label style="display:block; margin-bottom:5px; font-weight:600;">Naturaleza</label>
                        <select id="new-naturaleza" class="form-control"
                            style="width:100%; padding:10px; border-radius:8px; border:1px solid #ddd;">
                            <option value="Debito">Débito</option>
                            <option value="Credito">Crédito</option>
                        </select>
                    </div>
                    <div class="form-group" style="display: flex; flex-direction: column; gap: 8px;">
                        <label style="display:block; margin-bottom:5px; font-weight:600;">Configuración</label>
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem;">
                            <input type="checkbox" id="check-tercero"> Requiere Tercero
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem;">
                            <input type="checkbox" id="check-costos"> Requiere Centro de Costos
                        </label>
                        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9rem;">
                            <input type="checkbox" id="check-base"> Requiere Base
                        </label>
                    </div>
                </div>

                <div class="modal-actions" style="margin-top: 0;">
                    <button type="button" class="btn-secondary close-modal-btn"
                        data-target="modal-nueva-cuenta">Cancelar</button>
                    <button type="submit" class="btn-premium">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- JS LOADERS -->
    <script src="/frontend/assets/js/layout-loader.js"></script>
    <script src="/frontend/assets/js/auth_guard.js"></script>
    <script src="/frontend/assets/js/notifications.js"></script>

    <!-- PUC LOGIC -->
    <!-- PUC LOGIC -->
    <script src="/frontend/assets/js/puc.js"></script>
</body>

</html>
