<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPod | Cargos y Roles</title>
    <link rel="stylesheet" href="/frontend/assets/css/dashboard.css?v=1.2">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary-gradient: linear-gradient(135deg, #10b981 0%, #059669 100%);
            --glass-bg: rgba(255, 255, 255, 0.95);
        }

        body {
            background-color: #f3f4f6;
            background-image:
                radial-gradient(at 0% 0%, rgb(255, 255, 255) 0, transparent 50%),
                radial-gradient(at 50% 0%, rgb(255, 255, 255) 0, transparent 50%),
                radial-gradient(at 100% 0%, rgb(255, 255, 255) 0, transparent 50%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        .btn-premium {
            background: var(--primary-gradient);
            color: white;
            border: none;
            box-shadow: 0 4px 15px rgba(16, 185, 129, 0.4);
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .btn-premium:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.5);
        }

        .modal {
            background-color: rgba(15, 23, 42, 0.7) !important;
            backdrop-filter: blur(8px);
            display: none;
            align-items: center;
            justify-content: center;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000;
        }

        .modal-content-glass {
            background: white;
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
        }

        .form-control label {
            font-weight: 500;
            color: #475569;
            margin-bottom: 8px;
            display: block;
            font-size: 0.9rem;
        }

        .form-control input,
        .form-control textarea {
            background: rgba(243, 244, 246, 0.6);
            border: 1px solid rgba(203, 213, 225, 0.8);
            border-radius: 12px;
            padding: 12px;
            width: 100%;
            transition: all 0.2s;
        }
    </style>
</head>

<body>
    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <section class="form-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px;">
                <div>
                    <h2 style="font-size: 1.8rem; font-weight: 700; color: #1e293b; letter-spacing: -0.5px;">Cargos y
                        Roles</h2>
                    <p style="color: #64748b; margin-top: 5px;">Define los perfiles de tus colaboradores.</p>
                </div>
                <button class="btn-premium" id="btn-nuevo-cargo">
                    <i class="fas fa-plus-circle"></i> <span>Nuevo Cargo</span>
                </button>
            </div>

            <div class="table-container card" style="padding: 0; overflow-x: auto;">
                <table class="glass-table" style="width: 100%; border-collapse: collapse;">
                    <thead style="background: rgba(248, 250, 252, 0.5);">
                        <tr>
                            <th style="padding: 16px 24px; text-align: left;">Nombre del Cargo</th>
                            <th style="padding: 16px 24px; text-align: left;">Descripción</th>
                            <th style="padding: 16px 24px; text-align: center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="cargos-table-body">
                        <tr>
                            <td colspan="3" style="text-align: center; padding: 60px; color: #94a3b8;">
                                <i class="fas fa-spinner fa-spin"
                                    style="font-size: 2rem; margin-bottom: 15px; color: #10b981;"></i>
                                <p>Cargando cargos...</p>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- Modal Cargo -->
    <div id="modal-cargo" class="modal">
        <div class="modal-content-glass">
            <h2 id="modal-title" style="margin-bottom: 25px;">Nuevo Cargo</h2>
            <form id="form-cargo">
                <div class="form-control" style="margin-bottom: 20px;">
                    <label>Nombre <span style="color: #ef4444;">*</span></label>
                    <input type="text" id="cargo-nombre" required placeholder="Ej: Vendedor">
                </div>
                <div class="form-control" style="margin-bottom: 20px;">
                    <label>Descripción</label>
                    <textarea id="cargo-descripcion" rows="3" placeholder="Describe las funciones..."></textarea>
                </div>
                <div style="display: flex; gap: 15px; margin-top: 30px;">
                    <button type="button" class="close-modal"
                        style="flex: 1; padding: 12px; border-radius: 12px; border: 1px solid #e2e8f0; background: white; cursor: pointer;">Cancelar</button>
                    <button type="submit" class="btn-premium" style="flex: 1; justify-content: center;">Guardar
                        Cargo</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/frontend/assets/js/layout-loader.js"></script>
    <script src="/frontend/assets/js/auth_guard.js"></script>
    <script src="/frontend/assets/js/notifications.js"></script>
    <script src="/frontend/assets/js/nomina_roles.js"></script>
</body>

</html>
