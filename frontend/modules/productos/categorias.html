<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPod SOFTWARE | Categorías</title>
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <!-- CONTENT -->
    <main class="main-content">
        <div id="header-container"></div>

        <div class="action-bar"
            style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center;">
            <div style="display: flex; flex-direction: column;">
                <h1 style="font-size: 1.8rem; font-weight: 700; color: #1e293b; margin: 0;">Categorías</h1>
                <p style="color: #64748b; margin: 5px 0 0 0;">Gestione las categorías de sus productos.</p>
            </div>
            <button class="btn-primary" onclick="openModal()" style="display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-plus-circle"></i> Nueva Categoría
            </button>
        </div>

        <div class="table-container card" style="padding: 0; overflow: hidden; border-radius: 16px;">
            <table class="glass-table">
                <thead style="background: #f8fafc;">
                    <tr>
                        <th style="padding: 16px;">Nombre Categoría</th>
                        <th style="padding: 16px;">Descripción</th>
                        <th style="padding: 16px; text-align: center;">Estado</th>
                        <th style="padding: 16px; text-align: right;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="categorias-table-body">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- CATEGORY MODAL -->
    <div class="modal-overlay" id="categoryModal" style="display: none; align-items: center; justify-content: center;">
        <div class="modal-glass" style="width: 90%; max-width: 500px; display: flex; flex-direction: column;">
            <div class="modal-header"
                style="flex-shrink: 0; display: flex; justify-content: space-between; align-items: center;">
                <h2 id="modal-title" style="margin: 0;">Nueva Categoría</h2>
                <button onclick="closeModal()"
                    style="background: none; border: none; font-size: 1.5rem; color: #94a3b8; cursor: pointer;">&times;</button>
            </div>
            <div class="modal-body" style="padding: 30px;">
                <form id="categoryForm">
                    <input type="hidden" id="cat_id">
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label style="display: block; margin-bottom: 8px; font-weight: 500; color: #475569;">Nombre
                            <span style="color: #ef4444;">*</span></label>
                        <input type="text" id="nombre" required
                            style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;"
                            placeholder="Ej: Bebidas">
                    </div>
                    <div class="form-group" style="margin-bottom: 20px;">
                        <label
                            style="display: block; margin-bottom: 8px; font-weight: 500; color: #475569;">Descripción</label>
                        <textarea id="descripcion"
                            style="width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 8px;"
                            placeholder="Descripción opcional..."></textarea>
                    </div>
                    <div class="checkbox-wrapper" style="display: flex; align-items: center; gap: 10px;">
                        <input type="checkbox" id="activo" checked style="width: 18px; height: 18px;">
                        <label for="activo" style="margin: 0; cursor: pointer;">Activo</label>
                    </div>
                </form>
            </div>
            <div class="modal-footer"
                style="padding: 20px 30px; border-top: 1px solid rgba(0,0,0,0.05); text-align: right; background: rgba(255,255,255,0.4);">
                <button class="btn-secondary" onclick="closeModal()"
                    style="margin-right: 10px; padding: 10px 20px; border: 1px solid #e2e8f0; border-radius: 8px; background: white;">Cancelar</button>
                <button class="btn-primary" onclick="saveCategory()"
                    style="padding: 10px 20px; border: none; border-radius: 8px; background: #6366f1; color: white;">Guardar</button>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../../assets/js/layout-loader.js"></script>
    <script src="../../assets/js/auth_guard.js"></script>
    <script src="../../assets/js/notifications.js"></script>
    <script src="../../assets/js/categorias.js"></script>
</body>

</html>
