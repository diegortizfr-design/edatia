<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPod SOFTWARE | Gestión de Averías</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/dashboard.css">
    <link rel="stylesheet" href="../../assets/css/averias.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <!-- CONTENT -->
    <main class="main-content" style="background: #f8fafc;">
        <div id="header-container"></div>

        <div class="page-header" style="margin-bottom: 20px;">
            <h1 style="font-size: 1.5rem; color: var(--text-dark);">Gestión de Averías y Defectuosos</h1>
        </div>

        <!-- KPI Grid -->
        <section class="kpi-grid"
            style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px;">
            <div class="card"
                style="background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow-sm);">
                <div class="card-icon-box"
                    style="background: #e0e7ff; color: #4F46E5; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
                    <i class="fas fa-exclamation-circle"></i>
                </div>
                <h3 style="font-size: 0.9rem; color: #6B7280; margin: 0;">Total Ítems Averiados</h3>
                <p class="number" style="font-size: 1.5rem; font-weight: 700; color: #1F2937; margin: 5px 0 0 0;">0</p>
            </div>
            <div class="card"
                style="background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow-sm);">
                <div class="card-icon-box"
                    style="background: #fee2e2; color: #DC2626; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
                    <i class="fas fa-dollar-sign"></i>
                </div>
                <h3 style="font-size: 0.9rem; color: #6B7280; margin: 0;">Valor Estimado Pérdida</h3>
                <p class="number" style="font-size: 1.5rem; font-weight: 700; color: #DC2626; margin: 5px 0 0 0;">$ 0
                </p>
            </div>
            <div class="card"
                style="background: white; padding: 20px; border-radius: 16px; box-shadow: var(--shadow-sm);">
                <div class="card-icon-box"
                    style="background: #dcfce7; color: #16A34A; width: 40px; height: 40px; border-radius: 8px; display: flex; align-items: center; justify-content: center; margin-bottom: 10px;">
                    <i class="fas fa-recycle"></i>
                </div>
                <h3 style="font-size: 0.9rem; color: #6B7280; margin: 0;">Recuperados este mes</h3>
                <p class="number" style="font-size: 1.5rem; font-weight: 700; color: #1F2937; margin: 5px 0 0 0;">0</p>
            </div>
        </section>

        <!-- Actions Bar -->
        <div class="action-bar"
            style="margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; background: white; padding: 15px; border-radius: 16px; box-shadow: var(--shadow-sm);">
            <div class="search-box"
                style="display: flex; align-items: center; background: #f3f4f6; padding: 8px 15px; border-radius: 8px; width: 300px;">
                <i class="fas fa-search" style="color: #9ca3af; margin-right: 10px;"></i>
                <input type="text" id="searchAveriasInput" placeholder="Buscar en tabla..."
                    style="border: none; background: transparent; outline: none; width: 100%; font-size: 0.9rem;">
            </div>
            <button class="btn-primary" onclick="abrirModalReporte()"
                style="background: #4F46E5; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px;">
                <i class="fas fa-plus-circle"></i> Reportar Nueva Avería
            </button>
        </div>

        <!-- Table Container -->
        <div class="table-container"
            style="background: white; border-radius: 16px; padding: 20px; box-shadow: var(--shadow-sm); overflow-x: auto;">
            <table class="glass-table" style="width: 100%; border-collapse: collapse;">
                <thead>
                    <tr style="border-bottom: 1px solid #e5e7eb;">
                        <th style="padding: 15px; text-align: left; color: #6B7280; font-weight: 600;">Producto</th>
                        <th style="padding: 15px; text-align: left; color: #6B7280; font-weight: 600;">Motivo</th>
                        <th style="padding: 15px; text-align: left; color: #6B7280; font-weight: 600;">Sucursal</th>
                        <th style="padding: 15px; text-align: left; color: #6B7280; font-weight: 600;">Cantidad</th>
                        <th style="padding: 15px; text-align: left; color: #6B7280; font-weight: 600;">Fecha</th>
                        <th style="padding: 15px; text-align: left; color: #6B7280; font-weight: 600;">Estado</th>
                        <th style="padding: 15px; text-align: left; color: #6B7280; font-weight: 600;">Acciones</th>
                    </tr>
                </thead>
                <tbody id="tablaAverias">
                    <!-- Cargando... -->
                    <tr>
                        <td colspan="7" style="text-align:center; padding:20px;">Cargando datos...</td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>

    <!-- Modal Reportar Avería -->
    <div id="modalReporte" class="modal"
        style="display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.5); align-items: center; justify-content: center;">
        <div class="modal-content"
            style="background-color: white; padding: 30px; border-radius: 16px; width: 500px; max-width: 90%; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2);">
            <span class="close" onclick="cerrarModalReporte()"
                style="position: absolute; right: 20px; top: 20px; font-size: 1.5rem; cursor: pointer; color: #9ca3af;">&times;</span>
            <h2 style="margin-top: 0; color: #1F2937;">Reportar Producto Avariado</h2>
            <p style="color: #6B7280; font-size: 0.9rem; margin-bottom: 20px;">Este proceso <strong>descontará</strong>
                el producto del inventario activo y lo moverá a averías.</p>

            <form id="formAveria">
                <div class="form-group" style="margin-bottom: 15px;">
                    <label
                        style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: #374151;">Buscar
                        Producto</label>
                    <input type="text" placeholder="Escribe código o nombre..." class="full-width"
                        style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; box-sizing: border-box;">
                </div>

                <div class="row" style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 1; margin-bottom: 15px;">
                        <label
                            style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: #374151;">Sucursal
                            Origen</label>
                        <select
                            style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; box-sizing: border-box;">
                            <option>Sede Principal</option>
                            <option>Sede Norte</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1; margin-bottom: 15px;">
                        <label
                            style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: #374151;">Cantidad
                            Afectada</label>
                        <input type="number" min="1" value="1"
                            style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; box-sizing: border-box;">
                    </div>
                </div>

                <div class="form-group" style="margin-bottom: 15px;">
                    <label
                        style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: #374151;">Motivo
                        / Descripción del Daño</label>
                    <textarea rows="3" placeholder="Describa el defecto detalladamente..."
                        style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; resize: vertical; box-sizing: border-box;"></textarea>
                </div>

                <div class="form-group" style="margin-bottom: 20px;">
                    <label
                        style="display: block; margin-bottom: 5px; font-weight: 600; font-size: 0.9rem; color: #374151;">Estado
                        Inicial</label>
                    <select
                        style="width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.95rem; outline: none; box-sizing: border-box;">
                        <option value="Pendiente">Pendiente de Revisión</option>
                        <option value="Para Remate">Para Remate / Venta Segunda</option>
                        <option value="Para Regalo">Para Obsequio / Uso Interno</option>
                        <option value="Desechado">Desecho Total (Pérdida)</option>
                    </select>
                </div>

                <div class="form-actions" style="display: flex; justify-content: flex-end; gap: 10px;">
                    <button type="button" class="btn-secondary" onclick="cerrarModalReporte()"
                        style="background: #f3f4f6; color: #374151; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 500;">Cancelar</button>
                    <button type="submit" class="btn-primary"
                        style="background: #4F46E5; color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: 600;">Registrar
                        Avería</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../../assets/js/layout-loader.js"></script>
    <script src="../../assets/js/averias.js"></script>
</body>

</html>
