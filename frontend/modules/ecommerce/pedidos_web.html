<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPod SOFTWARE | Pedidos Web</title>
    <link rel="stylesheet" href="/frontend/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .status-pendiente {
            background: rgba(245, 158, 11, 0.1);
            color: #D97706;
        }

        .status-preparado {
            background: rgba(59, 130, 246, 0.1);
            color: #2563EB;
        }

        .status-enviado {
            background: rgba(139, 92, 246, 0.1);
            color: #7C3AED;
        }

        .status-facturado {
            background: rgba(16, 185, 129, 0.1);
            color: #059669;
        }

        .status-cancelado {
            background: rgba(239, 68, 68, 0.1);
            color: #DC2626;
        }

        .order-card {
            transition: transform 0.2s;
            cursor: pointer;
        }

        .order-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }
    </style>
</head>

<body>

    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <div class="action-bar"
            style="margin-top: 30px; display: flex; justify-content: space-between; align-items: center;">
            <div>
                <h2 style="color: var(--text-dark); margin: 0;"><i class="fas fa-shopping-basket"></i> Pedidos Online
                </h2>
                <p style="color: var(--text-gray); font-size: 0.9rem;">Gestiona y factura los pedidos recibidos desde la
                    tienda virtual.</p>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-secondary" onclick="loadOrders()"><i class="fas fa-sync"></i> Actualizar</button>
            </div>
        </div>

        <div class="card" style="margin-top: 20px; padding: 0;">
            <table class="glass-table">
                <thead>
                    <tr>
                        <th>Pedido #</th>
                        <th>Fecha</th>
                        <th>Cliente</th>
                        <th>Total</th>
                        <th>Estado</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody id="pedidos-table-body">
                    <!-- Dynamic Content -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- ORDER DETAIL MODAL -->
    <div class="modal-overlay" id="orderModal">
        <div class="modal-glass" style="max-width: 800px;">
            <div class="modal-header">
                <h2 id="modal-order-number">Pedido #</h2>
                <button class="close-btn" onclick="closeOrderModal()"><i class="fas fa-times"></i></button>
            </div>
            <div class="modal-body" id="order-detail-content">
                <!-- Dynamic Detail -->
            </div>
            <div class="modal-footer"
                style="padding: 20px; border-top: 1px solid #eee; display: flex; justify-content: flex-end; gap: 10px;">
                <button class="btn-secondary" onclick="closeOrderModal()">Cerrar</button>
                <div id="order-actions-btns" style="display: flex; gap: 10px;">
                    <!-- Action buttons based on status -->
                </div>
            </div>
        </div>
    </div>

    <script src="/frontend/assets/js/layout-loader.js"></script>
    <script src="/frontend/assets/js/auth_guard.js"></script>
    <script src="/frontend/assets/js/notifications.js"></script>
    <script src="/frontend/assets/js/pedidos_web.js"></script>
</body>

</html>
