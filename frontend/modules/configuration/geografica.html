<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPod SOFTWARE | Configuración Geográfica</title>
    <link rel="stylesheet" href="/frontend/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <!-- Tabs -->
        <div class="tabs-container">
            <button class="tab-btn active" data-tab="paises">Países</button>
            <button class="tab-btn" data-tab="departamentos">Departamentos</button>
            <button class="tab-btn" data-tab="ciudades">Ciudades</button>
        </div>

        <!-- PAISES TAB -->
        <div class="tab-content active" id="tab-paises">
            <div class="actions-bar">
                <button class="btn-primary" onclick="openPaisModal()">
                    <i class="fas fa-plus"></i> Nuevo País
                </button>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Nombre</th>
                            <th>Código</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="paises-table"></tbody>
                </table>
            </div>
        </div>

        <!-- DEPARTAMENTOS TAB -->
        <div class="tab-content" id="tab-departamentos">
            <div class="actions-bar">
                <button class="btn-primary" onclick="openDepartamentoModal()">
                    <i class="fas fa-plus"></i> Nuevo Departamento
                </button>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>País</th>
                            <th>Nombre</th>
                            <th>Código</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="departamentos-table"></tbody>
                </table>
            </div>
        </div>

        <!-- CIUDADES TAB -->
        <div class="tab-content" id="tab-ciudades">
            <div class="actions-bar">
                <button class="btn-primary" onclick="openCiudadModal()">
                    <i class="fas fa-plus"></i> Nueva Ciudad
                </button>
            </div>
            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Departamento</th>
                            <th>Nombre</th>
                            <th>Código</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="ciudades-table"></tbody>
                </table>
            </div>
        </div>

        <!-- MODAL PAIS -->
        <div class="modal" id="paisModal" style="display: none !important;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="paisModalTitle">Nuevo País</h2>
                    <span class="close" onclick="closePaisModal()">&times;</span>
                </div>
                <form id="paisForm">
                    <div class="form-group">
                        <label>Nombre *</label>
                        <input type="text" id="pais_nombre" required>
                    </div>
                    <div class="form-group">
                        <label>Código</label>
                        <input type="text" id="pais_codigo" maxlength="10">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" onclick="closePaisModal()">Cancelar</button>
                        <button type="submit" class="btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- MODAL DEPARTAMENTO -->
        <div class="modal" id="departamentoModal" style="display: none !important;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="departamentoModalTitle">Nuevo Departamento</h2>
                    <span class="close" onclick="closeDepartamentoModal()">&times;</span>
                </div>
                <form id="departamentoForm">
                    <div class="form-group">
                        <label>País *</label>
                        <select id="departamento_pais_id" required></select>
                    </div>
                    <div class="form-group">
                        <label>Nombre *</label>
                        <input type="text" id="departamento_nombre" required>
                    </div>
                    <div class="form-group">
                        <label>Código</label>
                        <input type="text" id="departamento_codigo" maxlength="10">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" onclick="closeDepartamentoModal()">Cancelar</button>
                        <button type="submit" class="btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- MODAL CIUDAD -->
        <div class="modal" id="ciudadModal" style="display: none !important;">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="ciudadModalTitle">Nueva Ciudad</h2>
                    <span class="close" onclick="closeCiudadModal()">&times;</span>
                </div>
                <form id="ciudadForm">
                    <div class="form-group">
                        <label>Departamento *</label>
                        <select id="ciudad_departamento_id" required></select>
                    </div>
                    <div class="form-group">
                        <label>Nombre *</label>
                        <input type="text" id="ciudad_nombre" required>
                    </div>
                    <div class="form-group">
                        <label>Código</label>
                        <input type="text" id="ciudad_codigo" maxlength="10">
                    </div>
                    <div class="modal-actions">
                        <button type="button" class="btn-secondary" onclick="closeCiudadModal()">Cancelar</button>
                        <button type="submit" class="btn-primary">Guardar</button>
                    </div>
                </form>
            </div>
        </div>

    </main>

    <script src="/frontend/shared/sidebar.js"></script>
    <script src="/frontend/shared/header.js"></script>
    <script src="../../assets/js/geografica.js"></script>
</body>

</html>
