<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPod SOFTWARE | Gestión de Equipo</title>
    <link rel="stylesheet" href="/frontend/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .tabs-header {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }

        .tab-btn {
            background: none;
            border: none;
            padding: 10px 20px;
            font-size: 1rem;
            font-weight: 600;
            color: #64748b;
            cursor: pointer;
            position: relative;
            transition: all 0.3s;
        }

        .tab-btn:hover {
            color: var(--primary-color);
        }

        .tab-btn.active {
            color: var(--primary-color);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -6px;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary-color);
            border-radius: 3px;
        }

        .tab-content {
            display: none;
            animation: fadeIn 0.3s ease;
        }

        .tab-content.active {
            display: block;
        }

        .audit-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
    </style>
</head>

<body>

    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <section class="form-section">
            <div style="margin-bottom: 25px;">
                <h2 style="font-size: 1.5rem; font-weight: 600;">Gestión de Equipo</h2>
                <p style="color: #64748b;">Administra los accesos, permisos y perfiles de tu organización.</p>
            </div>

            <!-- Tabs Navigation -->
            <div class="tabs-header">
                <button class="tab-btn active" onclick="switchTab('usuarios')"><i class="fas fa-users"></i>
                    Usuarios</button>
                <button class="tab-btn" onclick="switchTab('roles-cargos')"><i class="fas fa-user-shield"></i> Roles y
                    Cargos</button>
            </div>

            <!-- TAB: USUARIOS -->
            <div id="tab-usuarios" class="tab-content active">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                    <h3 style="font-size: 1.2rem; font-weight: 600;">Listado de Usuarios</h3>
                    <button class="btn-guardar" onclick="openUsuarioModal()"
                        style="background: var(--primary-color); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer;">
                        <i class="fas fa-user-plus"></i> Nuevo Usuario
                    </button>
                </div>

                <div class="table-container card" style="padding: 0; overflow: hidden; border-radius: 12px;">
                    <table class="glass-table">
                        <thead style="background: #f8fafc;">
                            <tr>
                                <th style="padding: 15px; text-align: left;">Usuario</th>
                                <th style="padding: 15px; text-align: left;">Email</th>
                                <th style="padding: 15px; text-align: left;">Rol</th>
                                <th style="padding: 15px; text-align: left;">Cargo</th>
                                <th style="padding: 15px; text-align: left;">Estado</th>
                                <th style="padding: 15px; text-align: center;">Acciones</th>
                            </tr>
                        </thead>
                        <tbody id="usuarios-table-body">
                            <!-- JS Load -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- TAB: ROLES Y CARGOS -->
            <div id="tab-roles-cargos" class="tab-content">
                <div class="audit-grid">
                    <!-- ROLES -->
                    <div class="card">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <h3 style="font-size: 1.1rem;"><i class="fas fa-user-tag"
                                    style="color:var(--primary-color)"></i> Roles</h3>
                            <button class="btn-primary" onclick="openRoleModal()"
                                style="font-size: 0.8rem; padding: 6px 12px;">+ Nuevo</button>
                        </div>
                        <table class="glass-table">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="roles-table-body"></tbody>
                        </table>
                    </div>

                    <!-- CARGOS -->
                    <div class="card">
                        <div
                            style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                            <h3 style="font-size: 1.1rem;"><i class="fas fa-briefcase"
                                    style="color:var(--primary-color)"></i> Cargos</h3>
                            <button class="btn-primary" onclick="openCargoModal()"
                                style="font-size: 0.8rem; padding: 6px 12px;">+ Nuevo</button>
                        </div>
                        <table class="glass-table">
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Rol Asignado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody id="cargos-table-body"></tbody>
                        </table>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- USUARIO MODAL -->
    <div id="usuarioModal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content card" style="width: 90%; max-width: 600px; padding: 0; overflow: hidden;">
            <div class="modal-header"
                style="background: #f8fafc; padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between;">
                <h3 id="modal-title-user" style="margin: 0;">Gestionar Usuario</h3>
                <button onclick="closeUsuarioModal()"
                    style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">&times;</button>
            </div>
            <form id="usuarioForm" style="padding: 20px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre" required
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                    </div>
                    <div class="form-group">
                        <label>Usuario (@)</label>
                        <input type="text" id="usuario_name" required
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="email"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                    </div>
                    <div class="form-group">
                        <label>Teléfono</label>
                        <input type="text" id="telefono"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                    </div>
                    <div class="form-group" style="display: none;">
                        <label>Rol de Sistema</label>
                        <select id="rol_id"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                            <option value="">Cargando...</option>
                        </select>
                    </div>
                    <div class="form-group" style="display: none;">
                        <label>Cargo en Empresa</label>
                        <select id="cargo_id"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                            <option value="">Cargando...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Estado</label>
                        <select id="estado"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Contraseña</label>
                        <input type="password" id="password"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;"
                            placeholder="Mínimo 6 caracteres">
                    </div>
                    <div class="form-group" style="grid-column: span 2;">
                        <label>Vínculo con Tercero (Colaborador) <span style="color: red;">* obligatorio</span></label>
                        <select id="tercero_id" required
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                            <option value="">Seleccione un colaborador...</option>
                        </select>
                    </div>
                </div>
                <div class="modal-footer"
                    style="margin-top: 20px; text-align: right; gap: 10px; display: flex; justify-content: flex-end;">
                    <button type="button" onclick="closeUsuarioModal()" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ROLE MODAL -->
    <div id="roleModal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content card" style="width: 90%; max-width: 400px; padding: 20px;">
            <h3>Gestionar Rol</h3>
            <form id="roleForm">
                <input type="hidden" id="edit_role_id">
                <div class="form-group">
                    <label>Nombre del Rol</label>
                    <input type="text" id="role_nombre" required
                        style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="role_descripcion"
                        style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;"></textarea>
                </div>
                <div style="text-align: right; margin-top: 15px;">
                    <button type="button" onclick="closeRoleModal()" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <!-- CARGO MODAL -->
    <div id="cargoModal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content card" style="width: 90%; max-width: 400px; padding: 20px;">
            <h3>Gestionar Cargo</h3>
            <form id="cargoForm">
                <input type="hidden" id="edit_cargo_id">
                <div class="form-group">
                    <label>Nombre del Cargo</label>
                    <input type="text" id="cargo_nombre" required
                        style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                </div>
                <div class="form-group">
                    <label>Descripción</label>
                    <textarea id="cargo_descripcion" rows="3"
                        style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;"></textarea>
                </div>
                <div class="form-group">
                    <label>Rol Asignado</label>
                    <select id="cargo_rol_id"
                        style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                        <option value="">Sin rol asignado</option>
                    </select>
                </div>
                <div style="text-align: right; margin-top: 15px;">
                    <button type="button" onclick="closeCargoModal()" class="btn-secondary">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/frontend/assets/js/layout-loader.js"></script>
    <script src="/frontend/assets/js/auth_guard.js"></script>
    <script src="/frontend/assets/js/notifications.js"></script>
    <script src="/frontend/assets/js/equipo.js"></script>
</body>

</html>
