<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ERPod SOFTWARE | Usuarios y Roles</title>
    <link rel="stylesheet" href="/frontend/assets/css/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>

    <div id="sidebar-container"></div>

    <main class="main-content">
        <div id="header-container"></div>

        <section class="form-section">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <div>
                    <h2 style="font-size: 1.5rem; font-weight: 600;">Usuarios y Seguridad</h2>
                    <p style="color: #64748b; margin-top: 5px;">Gestiona el acceso de tu equipo al sistema.</p>
                </div>
                <button class="btn-guardar"
                    style="background: var(--primary-color); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer;"
                    onclick="openModal()">
                    <i class="fas fa-user-plus"></i> Nuevo Usuario
                </button>
            </div>

            <div class="table-container card"
                style="padding: 0; overflow: hidden; border-radius: 12px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1);">
                <table class="glass-table">
                    <thead style="background: #f8fafc;">
                        <tr>
                            <th style="padding: 15px; text-align: left;">Usuario</th>
                            <th style="padding: 15px; text-align: left;">Email</th>
                            <th style="padding: 15px; text-align: left;">Rol</th>
                            <th style="padding: 15px; text-align: left;">Cargo</th>
                            <th style="padding: 15px; text-align: left;">Estado</th>
                            <th style="padding: 15px; text-align: center;">Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="usuarios-table-body">
                        <!-- Carga dinámica -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <!-- USUARIO MODAL -->
    <div id="usuarioModal" class="modal-overlay"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center;">
        <div class="modal-content card" style="width: 90%; max-width: 600px; padding: 0; overflow: hidden;">
            <div class="modal-header"
                style="background: #f8fafc; padding: 20px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between;">
                <h3 id="modal-title" style="margin: 0;">Gestionar Usuario</h3>
                <button onclick="closeModal()"
                    style="background: none; border: none; font-size: 1.2rem; cursor: pointer;">&times;</button>
            </div>
            <form id="usuarioForm" style="padding: 20px;">
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Nombre Completo</label>
                        <input type="text" id="nombre" required
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Usuario (@)</label>
                        <input type="text" id="usuario_name" required
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Email</label>
                        <input type="email" id="email"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Teléfono</label>
                        <input type="text" id="telefono"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Rol de Sistema</label>
                        <select id="rol_id"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                            <option value="">Cargando...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Cargo en Empresa</label>
                        <select id="cargo_id"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                            <option value="">Cargando...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Estado</label>
                        <select id="estado"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                            <option value="Activo">Activo</option>
                            <option value="Inactivo">Inactivo</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label style="display: block; margin-bottom: 5px; font-weight: 500;">Contraseña</label>
                        <input type="password" id="password"
                            style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                        <div class="form-group" style="grid-column: span 2;">
                            <label style="display: block; margin-bottom: 5px; font-weight: 500;">Vínculo con Colaborador
                                (Tercero)</label>
                            <select id="tercero_id"
                                style="width: 100%; padding: 10px; border: 1px solid #e2e8f0; border-radius: 6px;">
                                <option value="">Ninguno / No aplica</option>
                            </select>
                        </div>
                    </div>
                </div>
                <div class="modal-footer"
                    style="margin-top: 20px; text-align: right; gap: 10px; display: flex; justify-content: flex-end;">
                    <button type="button" class="btn-cancelar" onclick="closeModal()"
                        style="background: #f1f5f9; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Cancelar</button>
                    <button type="submit" class="btn-guardar"
                        style="background: var(--primary-color); border: none; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer;">Guardar
                        Usuario</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/frontend/assets/js/layout-loader.js"></script>
    <script src="/frontend/assets/js/auth_guard.js"></script>
    <script src="/frontend/assets/js/notifications.js"></script>
    <script src="/frontend/assets/js/usuarios.js"></script>
</body>

</html>
